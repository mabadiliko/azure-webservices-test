# App-of-apps root for the infrastructure / common-services layer.
# Recurses k8s/argocd/infra-apps/ — dropping a new Application manifest there and
# committing onboards a new common service. Apply this once at bootstrap
# (kubectl apply -f); everything else flows from Git via sync-waves.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  source:
    repoURL: https://github.com/mabadiliko/azure-webservices-test.git
    targetRevision: main
    path: k8s/argocd/infra-apps
    directory:
      recurse: true
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
