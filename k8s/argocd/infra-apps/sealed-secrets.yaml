# Wave 2 — the Sealed Secrets controller (bitnami-labs/sealed-secrets).
# Decrypts committed SealedSecret CRs into native Secrets in the same namespace.
# The commit-safe, self-service counterpart to ESO+Key Vault: projects seal their
# own secrets with `kubeseal` and commit them — no infra action per secret.
#
# Wave 2 (after the wave-1 sealed-secrets-key app) so the durable sealing key that
# ESO materializes is already present and labelled `active` when the controller
# starts — the controller then adopts it instead of generating a new key. Key
# auto-rotation is disabled in values.yaml (keyrenewperiod "0") to keep that one
# durable key authoritative across rebuilds.
#
# Image note: this is the upstream OSS project, not the retired Bitnami catalog;
# docker.io/bitnami/sealed-secrets-controller still publishes and pulls fine.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra
  destination:
    server: https://kubernetes.default.svc
    namespace: sealed-secrets
  sources:
    - repoURL: https://bitnami.github.io/sealed-secrets
      chart: sealed-secrets
      targetRevision: 2.19.1        # appVersion 0.38.4
      helm:
        releaseName: sealed-secrets
        valueFiles:
          - $values/k8s/infra-manifest/sealed-secrets/values.yaml
    - repoURL: https://github.com/mabadiliko/azure-webservices-test.git
      targetRevision: main
      ref: values
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
