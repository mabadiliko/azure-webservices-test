# Wave 1 — CloudNativePG operator. Per-project Postgres Cluster CRs are created
# on demand (not by this Application).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudnative-pg
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra
  destination:
    server: https://kubernetes.default.svc
    namespace: cnpg-system
  sources:
    - repoURL: https://cloudnative-pg.github.io/charts
      chart: cloudnative-pg
      targetRevision: 0.29.0
      helm:
        releaseName: cnpg
        valueFiles:
          - $values/k8s/infra-manifest/cloudnative-pg/values.yaml
    - repoURL: https://github.com/mabadiliko/azure-webservices-test.git
      targetRevision: main
      ref: values
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
