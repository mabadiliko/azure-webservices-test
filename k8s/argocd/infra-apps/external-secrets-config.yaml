# Wave 1 — External Secrets config: the shared ClusterSecretStore and the
# ExternalSecrets that materialize infra secrets from Key Vault (minio-root,
# loki-minio, thanos-objstore, grafana-admin, grafana-github-oauth).
#
# Separate from the external-secrets operator app (wave 0) because these are the
# operator's *custom resources* — they need its CRDs and webhook to exist first.
# Wave 1 puts them alongside MinIO (the first consumer): a consumer that starts
# a moment before its secret is materialized crash-loops and self-heals once ESO
# reconciles (seconds later), and every secret exists before wave-2 monitoring.
# No hand-seeding required. The ExternalSecrets target the minio/ and monitoring/
# namespaces (each carries an explicit namespace); if one syncs a beat before its
# consumer app has created that namespace, ArgoCD's retry/self-heal reapplies it.
#
# Raw-manifest (directory) source. values.yaml in this dir is the operator's Helm
# values (consumed via $values elsewhere), not a manifest — exclude it.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  source:
    repoURL: https://github.com/mabadiliko/azure-webservices-test.git
    targetRevision: main
    path: k8s/infra-manifest/external-secrets
    directory:
      recurse: true
      exclude: '{values.yaml,**/README.md}'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
