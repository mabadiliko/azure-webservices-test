# Wave 3 — Thanos (long-term / HA metrics). Reads the MinIO `thanos` bucket via
# the thanos-objstore secret; federates the Prometheus sidecar (wave 2). Uses the
# stevehipwell chart (upstream quay.io/thanos images — the Bitnami chart is dead).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: thanos
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  sources:
    - repoURL: https://stevehipwell.github.io/helm-charts/
      chart: thanos
      targetRevision: 1.23.1
      helm:
        releaseName: thanos
        valueFiles:
          - $values/k8s/infra-manifest/thanos/values.yaml
    - repoURL: https://github.com/mabadiliko/azure-webservices-test.git
      targetRevision: main
      ref: values
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
