# Wave 0 — External Secrets Operator (chart/operator only; the ClusterSecretStore
# and ExternalSecret CRs live in the external-secrets-config app). It sits in
# wave 0 so its CRDs and admission webhook are ready a full wave before anything
# references an ExternalSecret/ClusterSecretStore kind (config app, wave 1).
#
# Authenticates to Key Vault via Workload Identity; the SA is annotated with the
# managed identity's client-id. That client-id is environment-specific, so it is
# set as a Helm parameter here (an Azure identity ID, not a secret). Replace
# <ESO_CLIENT_ID> before use, or manage it out of band.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  sources:
    - repoURL: https://charts.external-secrets.io
      chart: external-secrets
      targetRevision: 2.7.0
      helm:
        releaseName: external-secrets
        valueFiles:
          - $values/k8s/infra-manifest/external-secrets/values.yaml
        parameters:
          - name: serviceAccount.annotations.azure\.workload\.identity/client-id
            value: <ESO_CLIENT_ID>
    - repoURL: https://github.com/mabadiliko/azure-webservices-test.git
      targetRevision: main
      ref: values
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
