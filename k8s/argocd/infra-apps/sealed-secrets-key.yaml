# Wave 1 — the durable Sealed Secrets sealing key (ExternalSecret), plus the
# sealed-secrets namespace it lives in. Split out from the controller app (wave 2)
# so the key Secret is materialized by ESO BEFORE the controller starts, letting
# the controller adopt the durable key instead of generating a fresh one on every
# rebuild. See k8s/infra-manifest/sealed-secrets/sealing-key-externalsecret.yaml.
#
# Depends on: the ESO operator (wave 0) and the azure-kv ClusterSecretStore
# (external-secrets-config, wave 1). If this syncs a beat before the store is
# validated, ESO self-heals and reconciles the key seconds later — still ahead of
# the wave-2 controller.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets-key
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra
  destination:
    server: https://kubernetes.default.svc
    namespace: sealed-secrets
  source:
    repoURL: https://github.com/mabadiliko/azure-webservices-test.git
    targetRevision: main
    path: k8s/infra-manifest/sealed-secrets
    directory:
      # Only the ExternalSecret is a manifest; values.yaml is the controller's
      # Helm values (consumed via $values by the sealed-secrets app), not a manifest.
      include: 'sealing-key-externalsecret.yaml'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
