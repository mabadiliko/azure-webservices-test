# Per-developer namespace-scoped access. Copy this file to
# serviceaccount-rbac.yaml (dropping the .example) to activate it — the .example
# is never synced, so an unfilled placeholder can't leak in.
#
# NAMING: the ServiceAccount name must be a DNS-1123 label (lowercase letters,
# digits, hyphens — no dots, no '@', so an email cannot be used directly). Use
# the developer's GitHub username, lowercased (GitHub handles are already
# DNS-safe and case-insensitive). Record the human identity in the annotations.
#
# ACCESS: clusterRole `admin` gives full control WITHIN the namespace; use
# `view` for read-only. Bind the SA into each namespace the developer manages
# (repeat the RoleBinding per namespace if the project has more than one).
#
# For more than one developer, add another ServiceAccount + RoleBinding pair
# (each SA name must be unique within the namespace).
#
# After committing (ArgoCD creates the SA + RoleBinding), mint a login token:
#   kubectl -n proj-scoutid create token hakan-persson --duration=8760h
# and give it to the developer to paste into Headlamp.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hakan-persson
  namespace: proj-scoutid
  annotations:
    scouterna.se/developer: hakan.persson@scouterna.se  # real human identity / contact
    scouterna.se/github: hakan-persson
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hakan-persson-admin
  namespace: proj-scoutid
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
subjects:
  - kind: ServiceAccount
    name: hakan-persson
    namespace: proj-scoutid
