# Per-developer namespace-scoped access. Rename PROJECT and DEVELOPER.
# The SA lives in one namespace; bind it (via RoleBinding) into each namespace
# the developer should manage. Use clusterRole `admin` for full control within
# the namespace, or `view` for read-only.
#
# Generate the login token with:
#   kubectl -n PROJECT-dev create token DEVELOPER --duration=8760h
# and paste it into Headlamp.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: DEVELOPER
  namespace: PROJECT-dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: DEVELOPER-admin
  namespace: PROJECT-dev
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
subjects:
  - kind: ServiceAccount
    name: DEVELOPER
    namespace: PROJECT-dev
