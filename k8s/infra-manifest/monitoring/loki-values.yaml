deploymentMode: SingleBinary

loki:
  # Chunks + index live in the in-cluster MinIO `loki` bucket (S3 API).
  # MinIO requires path-style addressing (s3forcepathstyle) and its own endpoint.
  # Credentials come from env vars sourced from the `minio-root` secret (see
  # extraEnv below) — referenced here with ${VAR} interpolation.
  storage:
    type: s3
    bucketNames:
      chunks: loki
      ruler: loki
      admin: loki
    s3:
      endpoint: http://minio.minio.svc.cluster.local:9000
      region: us-east-1            # arbitrary; MinIO ignores it but the client requires one
      accessKeyId: ${MINIO_ACCESS_KEY_ID}
      secretAccessKey: ${MINIO_SECRET_ACCESS_KEY}
      s3ForcePathStyle: true
      insecure: true               # in-cluster HTTP to MinIO (no TLS on the internal endpoint)
  schemaConfig:
    configs:
      - from: "2026-04-24"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  commonConfig:
    replication_factor: 1
  auth_enabled: false
  limits_config:
    allow_structured_metadata: false
  # Flush chunks to object storage promptly rather than holding them in the WAL
  # for up to the 30m default — on a low-volume cluster this bounds how much
  # recent log data would be lost if the single Loki pod died before flushing.
  ingester:
    chunk_idle_period: 2m
    max_chunk_age: 10m

singleBinary:
  replicas: 1
  # Interpolate ${VAR} in the config from env (for the S3 creds), and inject the
  # MinIO credentials from the loki-minio secret. These belong under
  # singleBinary (the single-binary pod), not the top-level loki: block.
  extraArgs:
    - -config.expand-env=true
  extraEnv:
    - name: MINIO_ACCESS_KEY_ID
      valueFrom:
        secretKeyRef:
          name: loki-minio
          key: accessKey
    - name: MINIO_SECRET_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: loki-minio
          key: secretKey
  # Small PVC still needed for the single-binary WAL / tsdb-shipper working dir;
  # chunks + index now live in MinIO, so this stays modest. 16Gi = E3 tier.
  persistence:
    enabled: true
    size: 16Gi
    storageClass: disk-standardssd

write:
  replicas: 0

read:
  replicas: 0

backend:
  replicas: 0

chunksCache:
  allocatedMemory: 64
  resources:
    requests:
      cpu: 50m

resultsCache:
  allocatedMemory: 32
  resources:
    requests:
      cpu: 50m
