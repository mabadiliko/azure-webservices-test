grafana:

  # The admin account is BREAK-GLASS ONLY — daily access is via GitHub OAuth
  # below. The password is random, seeded into the grafana-admin secret (Phase 1
  # bootstrap; later an ExternalSecret from Key Vault). Retrieve it only to
  # recover if GitHub OAuth is unavailable.
  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password

  # GitHub OAuth client secret, injected as GF_AUTH_GITHUB_CLIENT_SECRET from a
  # Kubernetes secret (NOT committed). Seed `grafana-github-oauth` with key
  # `client-secret` at bootstrap, or (preferred) materialize it via an
  # ExternalSecret from Key Vault. See k8s/infra-manifest/external-secrets/.
  extraSecretMounts:
    - name: github-oauth
      secretName: grafana-github-oauth
      mountPath: /etc/secrets/github-oauth
      readOnly: true
  # Point Grafana's [auth.github] client_secret at the mounted file.
  env:
    GF_AUTH_GITHUB_CLIENT_SECRET__FILE: /etc/secrets/github-oauth/client-secret

  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      acme.cert-manager.io/http01-ingress-class: "traefik"
    hosts:
      - grafana.wsv2test.j26.se
    path: /
    tls:
      - secretName: grafana-wsv2test-j26-se-tls
        hosts:
          - grafana.wsv2test.j26.se

  grafana.ini:
    server:
      domain: grafana.wsv2test.j26.se
      root_url: https://grafana.wsv2test.j26.se

    # Daily login = GitHub OAuth, restricted to the Scouterna org.
    # Create a GitHub OAuth App (Scouterna org -> Settings -> Developer settings
    # -> OAuth Apps): Homepage https://grafana.wsv2test.j26.se,
    # callback https://grafana.wsv2test.j26.se/login/github.
    # Put the Client ID below; the Client Secret comes from the mounted secret
    # (GF_AUTH_GITHUB_CLIENT_SECRET__FILE above), not this file.
    auth.github:
      enabled: true
      client_id: Ov23liQDmm14U0jTCkT5
      scopes: user:email,read:org
      auth_url: https://github.com/login/oauth/authorize
      token_url: https://github.com/login/oauth/access_token
      api_url: https://api.github.com/user
      allow_sign_up: true
      # Only members of the Scouterna GitHub org may log in.
      allowed_organizations: Scouterna
      # Map GitHub teams -> Grafana roles. Replace the team slugs/numbers with
      # the real Scouterna teams. Everyone in the org who is not matched gets the
      # default role from [auth] (Viewer, set below).
      role_attribute_path: >-
        contains(groups[*], '@scouterna/infra') && 'Admin' ||
        contains(groups[*], '@scouterna/webservices') && 'Editor' ||
        'Viewer'
      skip_org_role_sync: false

    auth:
      # New GitHub users who match no team get Viewer, not Editor.
      disable_login_form: false
      oauth_auto_login: false
    users:
      auto_assign_org_role: Viewer

  resources:
    requests:
      cpu: 50m
      memory: 200Mi
    limits:
      memory: 900Mi

  persistence:
    enabled: true
    storageClassName: disk-standardssd
    size: 8Gi

  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://loki-gateway.monitoring.svc.cluster.local
      jsonData:
        maxLines: 1000
    # Thanos Query — long-term / HA metrics (federates the live Prometheus
    # sidecar + the MinIO-backed store gateway). Prometheus-compatible API on
    # the thanos-query service (HTTP port 10902).
    - name: Thanos
      type: prometheus
      access: proxy
      url: http://thanos-query.monitoring.svc.cluster.local:10902
      jsonData:
        timeInterval: 30s

prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: 12GB
    # Thanos sidecar: uploads Prometheus TSDB blocks to the MinIO `thanos`
    # bucket (config in the thanos-objstore secret) for long-term/HA metrics.
    # Thanos Query/Store/Compactor read the same bucket.
    thanos:
      objectStorageConfig:
        existingSecret:
          name: thanos-objstore
          key: objstore.yml
    resources:
      requests:
        cpu: 50m
        memory: 200Mi
      limits:
        memory: 600Mi
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: disk-standardssd
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 32Gi

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: disk-standardssd
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 4Gi
