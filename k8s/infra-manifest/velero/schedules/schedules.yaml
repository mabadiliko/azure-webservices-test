# Velero backup schedules. Applied alongside the Velero install (same namespace).
#
# Strategy: back up PROJECT namespaces daily (their state + PV data). Infra
# namespaces are reproducible from Git (ArgoCD) so they don't strictly need
# backing up — but a weekly full backup is a cheap safety net for the whole
# cluster's API state.
---
# Daily backup of project namespaces (anything NOT infra). 14-day retention.
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: daily-projects
  namespace: velero
spec:
  schedule: "0 2 * * *" # 02:00 daily
  template:
    ttl: 336h # 14 days
    includedNamespaces:
      - "*"
    excludedNamespaces:
      # Infra namespaces are reproducible from Git via ArgoCD.
      - kube-system
      - kube-public
      - kube-node-lease
      - argocd
      - cert-manager
      - traefik
      - minio
      - monitoring
      - cnpg-system
      - external-secrets
      - headlamp
      - velero
    snapshotVolumes: true
    storageLocation: default
---
# Weekly full-cluster backup (all namespaces incl. infra) — safety net. 5 weeks.
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: weekly-full
  namespace: velero
spec:
  schedule: "0 3 * * 0" # 03:00 Sundays
  template:
    ttl: 840h # 35 days
    includedNamespaces:
      - "*"
    snapshotVolumes: true
    storageLocation: default
