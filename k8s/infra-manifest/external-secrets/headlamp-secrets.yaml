# Headlamp OIDC secret, materialized from Azure Key Vault by ESO.
#
# Headlamp is the `headlamp` static client of Dex; both sides share the same
# client secret. Dex reads it as $HEADLAMP_CLIENT_SECRET (dex-oauth secret);
# Headlamp reads it here. The clientID and issuerURL are not secret, but the
# Headlamp chart's `existing secret` mode expects all three keys in one secret,
# so we assemble them via a template: clientID and issuerURL are literals, the
# clientSecret comes from Key Vault (dex-headlamp-client-secret).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: headlamp-oidc
  namespace: headlamp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-kv
    kind: ClusterSecretStore
  target:
    name: headlamp-oidc
    creationPolicy: Owner
    template:
      # Headlamp's chart Option-3 (externalSecret) mode envFrom-loads this secret,
      # so the KEYS must be the env-var names the deployment args reference
      # (OIDC_CLIENT_ID etc.), NOT camelCase clientID. (The chart's create:true
      # secret confusingly uses camelCase read a different way — do not copy it.)
      data:
        OIDC_CLIENT_ID: headlamp
        OIDC_ISSUER_URL: https://dex.wsv2test.j26.se
        OIDC_CLIENT_SECRET: "{{ .clientSecret }}"
        # Space-separated OIDC scopes Headlamp requests from Dex. `openid` is
        # required; profile/email identify the user. No `groups` — authorization
        # is per-user RoleBindings keyed on the GitHub login, not team groups.
        OIDC_SCOPES: "openid profile email"
  data:
    - secretKey: clientSecret
      remoteRef:
        key: dex-headlamp-client-secret
