# Headlamp OIDC client secret, materialized from Azure Key Vault by ESO.
#
# Headlamp reads this as OIDC_CLIENT_SECRET (env valueFrom -> key `clientSecret`)
# in its Deployment (k8s/infra-manifest/headlamp/deployment.yaml). Same value Dex
# holds for its `headlamp` static client (dex-oauth/headlamp-client-secret); both
# come from Key Vault secret dex-headlamp-client-secret.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: headlamp-oidc
  namespace: headlamp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-kv
    kind: ClusterSecretStore
  target:
    name: headlamp-oidc
    creationPolicy: Owner
  data:
    - secretKey: clientSecret
      remoteRef:
        key: dex-headlamp-client-secret
