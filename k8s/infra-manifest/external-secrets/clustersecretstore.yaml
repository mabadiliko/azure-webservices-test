# The single shared ClusterSecretStore, pointing at the durable Key Vault.
# ESO authenticates via Workload Identity (its ServiceAccount federates to the
# managed identity that holds 'Key Vault Secrets User' on the vault — see doc 02).
#
# Edit vaultUrl to the actual Key Vault (kept out of Git as it's environment-
# specific; replace <KEY_VAULT_NAME> before applying, or template it).
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: azure-kv
spec:
  provider:
    azurekv:
      authType: WorkloadIdentity
      vaultUrl: https://kv-scouterna-webservices.vault.azure.net/
      serviceAccountRef:
        name: external-secrets
        namespace: external-secrets
