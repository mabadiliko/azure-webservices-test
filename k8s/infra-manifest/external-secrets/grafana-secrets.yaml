# Grafana secrets, materialized from Azure Key Vault by ESO.
# These replace the Phase-1 manual `kubectl create secret` seeding.
#
# Prereqs: ESO installed, the `azure-kv` ClusterSecretStore validated, and the
# following secrets present in the Key Vault:
#   - grafana-admin-password      (random; break-glass admin password)
#   - grafana-github-client-secret (the GitHub OAuth App client secret)
---
# Break-glass admin credentials. Grafana reads existingSecret `grafana-admin`
# with keys admin-user / admin-password.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-kv
    kind: ClusterSecretStore
  target:
    name: grafana-admin
    creationPolicy: Owner
    template:
      data:
        admin-user: admin
        admin-password: "{{ .adminPassword }}"
  data:
    - secretKey: adminPassword
      remoteRef:
        key: grafana-admin-password
---
# GitHub OAuth client secret. Grafana mounts this secret at
# /etc/secrets/github-oauth and reads key `client-secret`.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-github-oauth
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-kv
    kind: ClusterSecretStore
  target:
    name: grafana-github-oauth
    creationPolicy: Owner
  data:
    - secretKey: client-secret
      remoteRef:
        key: grafana-github-client-secret
