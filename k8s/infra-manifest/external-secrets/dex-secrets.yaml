# Dex OAuth secrets, materialized from Azure Key Vault by ESO.
#
# Prereqs: ESO installed, the `azure-kv` ClusterSecretStore validated, and these
# secrets present in the Key Vault:
#   - dex-github-client-secret    (the client secret of Dex's GitHub OAuth App)
#   - dex-headlamp-client-secret  (a random secret shared between Dex and Headlamp
#                                  for the `headlamp` static client)
#
# Dex reads these as env vars $GITHUB_CLIENT_SECRET / $HEADLAMP_CLIENT_SECRET
# (see k8s/infra-manifest/dex/values.yaml envVars). Headlamp reads the same
# headlamp-client-secret via its own ExternalSecret (see headlamp-secrets.yaml).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dex-oauth
  namespace: dex
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-kv
    kind: ClusterSecretStore
  target:
    name: dex-oauth
    creationPolicy: Owner
  data:
    - secretKey: github-client-secret
      remoteRef:
        key: dex-github-client-secret
    - secretKey: headlamp-client-secret
      remoteRef:
        key: dex-headlamp-client-secret
