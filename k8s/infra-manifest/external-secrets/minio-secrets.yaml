# MinIO-derived secrets, materialized from Key Vault by ESO.
# These replace the first-boot hand-seeding; on a rebuild ESO recreates them
# from KV automatically. Requires in the Key Vault:
#   - minio-root-user
#   - minio-root-password
---
# MinIO root credentials (MinIO chart reads existingSecret `minio-root`).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minio-root
  namespace: minio
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-kv
    kind: ClusterSecretStore
  target:
    name: minio-root
    creationPolicy: Owner
  data:
    - secretKey: rootUser
      remoteRef:
        key: minio-root-user
    - secretKey: rootPassword
      remoteRef:
        key: minio-root-password
---
# Loki's MinIO credentials (loki-values reads secret `loki-minio`).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: loki-minio
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-kv
    kind: ClusterSecretStore
  target:
    name: loki-minio
    creationPolicy: Owner
  data:
    - secretKey: accessKey
      remoteRef:
        key: minio-root-user
    - secretKey: secretKey
      remoteRef:
        key: minio-root-password
---
# Thanos objstore config for the Prometheus sidecar + Thanos components.
# The whole objstore.yml is composed by an ESO template from the MinIO KV values.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: thanos-objstore
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-kv
    kind: ClusterSecretStore
  target:
    name: thanos-objstore
    creationPolicy: Owner
    template:
      data:
        objstore.yml: |
          type: S3
          config:
            bucket: thanos
            endpoint: minio.minio.svc.cluster.local:9000
            access_key: "{{ .accessKey }}"
            secret_key: "{{ .secretKey }}"
            insecure: true
  data:
    - secretKey: accessKey
      remoteRef:
        key: minio-root-user
    - secretKey: secretKey
      remoteRef:
        key: minio-root-password
