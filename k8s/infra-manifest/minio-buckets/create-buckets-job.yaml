# Creates the buckets the platform needs in MinIO: loki, thanos, velero.
#
# Why a standalone Job instead of the min.io chart's built-in bucket creation:
# the chart provisions buckets via a Helm `post-install` hook, which ArgoCD maps
# to a PostSync hook. That only runs after the MinIO app syncs cleanly — and on a
# fresh bring-up MinIO can't fully sync until its `minio-root` secret exists (ESO
# materializes it), so the hook is skipped and the buckets are never created.
# Thanos-store then crash-loops on "bucket does not exist". This Job makes bucket
# creation a first-class, ArgoCD-tracked, idempotent resource instead.
#
# Idempotent: `mc mb --ignore-existing` is a no-op if the bucket already exists,
# so it's safe to re-run on every sync / rebuild.
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-create-buckets
  namespace: minio
  annotations:
    # Run as an ArgoCD sync hook and replace the previous Job each sync — a Job's
    # pod template is immutable, so recreating it is how re-runs work on rebuilds.
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 10
  template:
    metadata:
      name: minio-create-buckets
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: quay.io/minio/mc:RELEASE.2025-04-16T18-13-26Z
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-root
                  key: rootUser
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-root
                  key: rootPassword
          command:
            - /bin/sh
            - -c
            - |
              set -e
              # Wait for MinIO to answer before creating buckets.
              until mc alias set local http://minio.minio.svc.cluster.local:9000 \
                    "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" >/dev/null 2>&1; do
                echo "waiting for MinIO..."; sleep 3
              done
              for b in loki thanos velero; do
                mc mb --ignore-existing "local/$b"
              done
              echo "buckets ready: loki thanos velero"
