# The durable Sealed Secrets SEALING KEY, materialized from the Key Vault by ESO.
#
# Why this exists: the sealed-secrets controller normally generates its own RSA
# key on first start and self-rotates it. A cluster rebuild would then mint a NEW
# key, making every committed SealedSecret undecryptable. Instead we keep ONE
# long-lived key in the durable Key Vault and have ESO recreate it here on every
# rebuild — BEFORE the controller starts (this is sync-wave 1; the controller is
# wave 2). The controller discovers sealing keys by LABEL, not name, and adopts
# any it finds, so it uses this one instead of generating a fresh key.
#
# Requirements for the controller to adopt it:
#   - type: kubernetes.io/tls  (tls.crt = public cert, tls.key = private key)
#   - label sealedsecrets.bitnami.com/sealing-key: active
#
# Key Vault contents (created once by infra — see docs/install.md):
#   - sealed-secrets-tls-crt : the PEM public certificate
#   - sealed-secrets-tls-key : the PEM private key
# Generate the pair once and store it; the controller auto-rotation is disabled
# (keyrenewperiod "0") so this single key stays authoritative.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sealed-secrets-key
  namespace: sealed-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-kv
    kind: ClusterSecretStore
  target:
    name: sealed-secrets-key      # name is not load-bearing; the label is
    creationPolicy: Owner
    template:
      type: kubernetes.io/tls
      metadata:
        labels:
          # THIS is how the controller finds and adopts the key.
          sealedsecrets.bitnami.com/sealing-key: active
      data:
        tls.crt: "{{ .cert }}"
        tls.key: "{{ .key }}"
  data:
    - secretKey: cert
      remoteRef:
        key: sealed-secrets-tls-crt
    - secretKey: key
      remoteRef:
        key: sealed-secrets-tls-key
