replicaCount: 1

# OIDC SSO via Dex (which fronts GitHub). Developers log in with their GitHub
# identity instead of pasting a ServiceAccount token. The clientID / clientSecret
# / issuerURL / scopes come from the existing secret `headlamp-oidc`, assembled
# by ESO from Key Vault (see k8s/infra-manifest/external-secrets/headlamp-secrets.yaml).
# Authorization is still Kubernetes RBAC: a logged-in user sees only namespaces
# where a RoleBinding grants their OIDC username (kind: User = the GitHub login).
config:
  oidc:
    # Use the ESO-managed secret headlamp-oidc as an EXTERNAL secret (Option 3
    # in the chart). This is the mode that envFrom-loads clientID/clientSecret/
    # issuerURL/scopes from an existing secret. NOTE: `secret.create: false`
    # alone (Option 1) does NOT wire the existing secret — it expects inline
    # values — so externalSecret.enabled is required here.
    secret:
      create: false
    externalSecret:
      enabled: true
      name: headlamp-oidc
    callbackURL: https://headlamp.wsv2test.j26.se/oidc-callback

ingress:
  enabled: true
  ingressClassName: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    acme.cert-manager.io/http01-ingress-class: traefik
  hosts:
    - host: headlamp.wsv2test.j26.se
      paths:
        - path: /
          type: Prefix
  tls:
    - secretName: headlamp-tls
      hosts:
        - headlamp.wsv2test.j26.se

serviceAccount:
  create: true
  automountServiceAccountToken: true

rbac:
  create: true

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 256Mi
