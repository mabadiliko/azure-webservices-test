apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: headlamp
  namespace: headlamp
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    acme.cert-manager.io/http01-ingress-class: traefik
spec:
  ingressClassName: traefik
  rules:
    - host: headlamp.wsv2test.j26.se
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: headlamp
                port:
                  name: http
  tls:
    - secretName: headlamp-tls
      hosts:
        - headlamp.wsv2test.j26.se
