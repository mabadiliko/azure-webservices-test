# cert-manager ClusterIssuers for the cluster.
# Traefik is the default ingress class, so one http01 solver per issuer suffices.
#
# Use letsencrypt-staging while wiring up a new host (Let's Encrypt has strict
# rate limits on the prod endpoint), then switch the annotation to
# letsencrypt-prod once the cert issues cleanly.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    email: info@scouterna.se
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - http01:
        ingress:
          class: traefik
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    email: info@scouterna.se
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-staging
    solvers:
    - http01:
        ingress:
          class: traefik
