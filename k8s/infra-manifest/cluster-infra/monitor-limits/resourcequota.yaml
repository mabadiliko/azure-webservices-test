# Reactive ResourceQuota — apply to a SPECIFIC misbehaving namespace only.
# A hard ceiling on the namespace's total footprint. Edit NAMESPACE + numbers.
apiVersion: v1
kind: ResourceQuota
metadata:
  name: reactive-quota
  namespace: NAMESPACE
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 4Gi
    limits.cpu: "4"
    limits.memory: 8Gi
    persistentvolumeclaims: "10"
    pods: "50"
